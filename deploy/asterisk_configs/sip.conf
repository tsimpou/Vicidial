; ============================================================
; sip.conf — VICIdial Asterisk Configuration
; Copy to: /etc/asterisk/sip.conf on ALL Asterisk servers
; 
; CRITICAL for Google Cloud (NAT):
;   Replace YOUR_EXTERNAL_IP with the static external IP
;   Replace YOUR_LOCAL_SUBNET with your GCE subnet (10.10.0.0/24)
; ============================================================

[general]
; NAT settings — REQUIRED for GCE (behind NAT)
externip=YOUR_EXTERNAL_IP          ; The static GCE external IP
localnet=10.10.0.0/255.255.255.0   ; GCE VPC subnet (adjust if different)
nat=yes

; General SIP settings
context=default
bindport=5060
bindaddr=0.0.0.0
srvlookup=yes
allowguest=no                      ; Security: no anonymous calls
alwaysauthreject=yes               ; Security: prevent user enumeration

; Codec settings (order = preference)
disallow=all
allow=ulaw                         ; G.711 μ-law (standard in US/Greece)
allow=alaw                         ; G.711 A-law (standard in Europe/Greece)
allow=g729                         ; G.729 (compressed, good for bandwidth)
allow=gsm                          ; GSM fallback

; Reliability
qualify=yes
qualifyfreq=60
t1min=100
t2=5000
timerb=8000
defaultexpiry=120
minexpiry=60
maxexpiry=3600

; SIP registration timeout
registertimeout=20
registerattempts=0                  ; Keep retrying forever

; Recording
callcounter=yes

; ============================================================
; Greek SIP Trunk Provider
; Fill in the credentials from your SIP provider
; ============================================================
[greek-trunk]
type=peer
host=YOUR_SIP_PROVIDER_HOST        ; e.g., sip.cyta.gr or sip.forthnet.gr
secret=YOUR_SIP_PASSWORD
username=YOUR_SIP_USERNAME
authuser=YOUR_SIP_USERNAME
fromuser=YOUR_SIP_USERNAME
fromdomain=YOUR_SIP_PROVIDER_DOMAIN
insecure=port,invite              ; Usually needed for Greek providers
nat=yes
qualify=yes
dtmfmode=rfc2833
disallow=all
allow=alaw
allow=ulaw
canreinvite=no
sendrpid=yes
trustrpid=yes

; Registration line (for outbound calls)
register => YOUR_SIP_USERNAME:YOUR_SIP_PASSWORD@YOUR_SIP_PROVIDER_HOST/YOUR_DID_NUMBER

; ============================================================
; Agent SIP Phones (Softphones)
; Add one [peer] section per agent or use dynamic registration
; For 50+ agents, use dynamic with a pattern
; ============================================================

; Dynamic agent phone template (agents connect with their extension)
[agent-phones](!)
type=friend
context=from-internal
host=dynamic
nat=yes
qualify=yes
dtmfmode=rfc2833
disallow=all
allow=ulaw
allow=alaw
allow=g729
callgroup=1
pickupgroup=1
secret=agent-default-pass         ; Override per-agent in admin UI

; ============================================================
; VICIdial internal extensions (do not change)
; ============================================================
[vicidial-local]
type=peer
host=127.0.0.1
username=vicidial
secret=donotedit
context=default
