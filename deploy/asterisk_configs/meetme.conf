; ============================================================
; meetme.conf — Conference Bridge Configuration
; Required for 3-way calls and supervisor barge-in
; Copy to: /etc/asterisk/meetme.conf
; ============================================================

[general]
; MeetMe uses DAHDI/ztdummy for timing
; On GCE (no hardware timer), use dahdi_dummy module

[rooms]
; VICIdial conference rooms (8600001 - 8600300)
; These map to agent extensions. One room per concurrent agent.
; The range below supports 300 concurrent calls.

conf => 8600001
conf => 8600002
conf => 8600003
conf => 8600004
conf => 8600005
; ... VICIdial admin will auto-add these if needed
; Range: 8600001-8600300 for 300 concurrent calls
