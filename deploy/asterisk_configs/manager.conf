; ============================================================
; manager.conf — Asterisk Manager Interface (AMI)
; REQUIRED by VICIdial — it uses AMI to control Asterisk
; Copy to: /etc/asterisk/manager.conf
; ============================================================

[general]
enabled=yes
port=5038
bindaddr=127.0.0.1          ; Listen only on localhost (security)
displayconnects=no

; ============================================================
; VICIdial AMI user (do not change the username)
; ============================================================
[VDAD]
secret=CHANGE_ME_AMI_PASSWORD      ; Set a strong password
deny=0.0.0.0/0.0.0.0
permit=127.0.0.1/255.255.255.0    ; Localhost only
permit=10.10.0.0/255.255.255.0    ; VPC subnet (for inter-server)
read=system,call,log,verbose,command,agent,user,originate
write=system,call,log,verbose,command,agent,user,originate
