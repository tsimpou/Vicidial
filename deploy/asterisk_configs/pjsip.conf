; ============================================================
; pjsip.conf - Asterisk PJSIP Configuration for VICIdial
; Base transport config — VICIdial ADMIN_keepalive_ALL.pl
; will dynamically append phone and carrier sections.
; ============================================================

[global]
type=global
user_agent=Asterisk
endpoint_identifier_order=username,ip,anonymous
max_initial_qualify_time=4
default_outbound_endpoint=default_outbound

; ============================================================
; UDP Transport (primary — required for SIP phones & trunks)
; ============================================================
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
external_media_address=34.79.89.1
external_signaling_address=34.79.89.1
local_net=10.10.0.0/24
local_net=127.0.0.1/8

; ============================================================
; TCP Transport (optional but useful for some providers)
; ============================================================
[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0:5060
external_media_address=34.79.89.1
external_signaling_address=34.79.89.1
local_net=10.10.0.0/24
local_net=127.0.0.1/8

; ============================================================
; Default outbound endpoint (used as template)
; ============================================================
[default_outbound]
type=endpoint
context=default
disallow=all
allow=ulaw
allow=alaw
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
