; ============================================================
; extensions.conf — VICIdial Dialplan
; Copy to: /etc/asterisk/extensions.conf on ALL Asterisk servers
;
; This is a simplified version — VICIdial also writes its own
; dialplan entries via admin.php (carriers, inbound DIDs, etc.)
; ============================================================

[globals]
VICIDIAL_AGI=agi://127.0.0.1:4577    ; FastAGI server (VICIdial daemon)

; ============================================================
; Default context — hangup handler (REQUIRED by VICIdial)
; ============================================================
[default]
; Hangup handler — logs call details back to VICIdial
exten => h,1,DeadAGI(agi://127.0.0.1:4577/call_log--HVcauses--PRI-----NODEBUG-----${HANGUPCAUSE}-----${DIALSTATUS}-----${DIALEDTIME}-----${ANSWEREDTIME})

; ============================================================
; Inbound context — calls from SIP trunk
; ============================================================
[from-trunk]
; Route all inbound calls to VICIdial inbound handler
exten => _X.,1,NoOp(Inbound call from trunk: ${CALLERID(num)})
exten => _X.,n,AGI(agi-VDAD_ALL_inbound.agi)
exten => _X.,n,Hangup()

; DID routing — VICIdial manages this via admin
exten => h,1,DeadAGI(agi://127.0.0.1:4577/call_log--HVcauses--PRI-----NODEBUG-----${HANGUPCAUSE}-----${DIALSTATUS}-----${DIALEDTIME}-----${ANSWEREDTIME})

; ============================================================
; Internal agent phone context
; ============================================================
[from-internal]
; Pass all internal calls to VICIdial AGI
exten => _X.,1,AGI(agi://127.0.0.1:4577/${EXTEN})
exten => _X.,n,Hangup()

exten => h,1,DeadAGI(agi://127.0.0.1:4577/call_log--HVcauses--PRI-----NODEBUG-----${HANGUPCAUSE}-----${DIALSTATUS}-----${DIALEDTIME}-----${ANSWEREDTIME})

; ============================================================
; VICIdial outbound dialing context
; ============================================================
[VDAD_outbound]
; Outbound via Greek SIP trunk — 'o' flag required for VICIdial
exten => _X.,1,Dial(SIP/greek-trunk/${EXTEN},55,oHhTt)
exten => _X.,n,Hangup()

exten => h,1,DeadAGI(agi://127.0.0.1:4577/call_log--HVcauses--PRI-----NODEBUG-----${HANGUPCAUSE}-----${DIALSTATUS}-----${DIALEDTIME}-----${ANSWEREDTIME})

; ============================================================
; Conference bridge context (MeetMe rooms for 3-way calls)
; ============================================================
[conferences]
exten => _8600XXX,1,MeetMe(${EXTEN},dqMst)
exten => h,1,DeadAGI(agi://127.0.0.1:4577/call_log--HVcauses--PRI-----NODEBUG-----${HANGUPCAUSE}-----${DIALSTATUS}-----${DIALEDTIME}-----${ANSWEREDTIME})

; ============================================================
; Voicemail context
; ============================================================
[voicemail]
exten => _X.,1,VoiceMailMain(${EXTEN}@default)
exten => _X.,n,Hangup()
